<!DOCTYPE html>

                    "fontFamily": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pb-24 md:pb-0 pt-14">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline shadow-sm flex items-center justify-between px-margin-mobile h-14 w-full">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-variant overflow-hidden">
<img alt="User Avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDFYohHX74zr2KMKFEaygdLphHfwL8BnVUFmlRHTuPOTB9Nu-d3rVROZiXXbVkOWXu-3nVIJojTTgwTdavhlxOuYEEAt9kE5Co90ppIxZi3uauQmPsfmv1l-6i7j_nJtdegQ-_-OvFc4LDg9e92yoCGKPPuFcQ9b5cBW0LCNtMTlJ2d1M-GXOCKpXJQv86zDQn12-9Xziz6W2JpZSm2uuy9D9BE0CZIZpSOJCOjzyNjOTc53wTCpUBZ99nzGeITUdurc5vgCL-Jo-M"/>
</div>
<div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed-dim">RapidCare</h1>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors active:scale-95 duration-150 ease-in-out text-primary dark:text-primary-fixed-dim">
<span class="material-symbols-outlined">emergency_home</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-margin-mobile py-stack-md flex flex-col gap-stack-lg max-w-4xl mx-auto w-full">
<!-- Welcome & Status Area -->
<section class="flex flex-col gap-stack-sm pt-4">
<div class="flex justify-between items-end">
<div>
<p class="font-body-md text-body-md text-on-surface-variant">Good Morning,</p>
<h2 class="font-title-lg text-title-lg text-on-surface">Alex Johnson</h2>
</div>
<div class="flex items-center bg-surface-container-low px-3 py-1.5 rounded-full border border-outline-variant">
<span class="material-symbols-outlined text-primary text-[18px] mr-1">location_on</span>
<span class="font-label-md text-label-md text-on-surface">Downtown, NY</span>
</div>
</div>
</section>
<!-- Primary Actions (Bento-ish Grid) -->
<section class="grid grid-cols-1 sm:grid-cols-2 gap-stack-md">
<!-- Find Ambulance Card -->
<button class="group relative overflow-hidden bg-surface rounded-xl shadow-sm border border-outline-variant p-6 text-left hover:shadow-md hover:bg-surface-container-lowest transition-all active:scale-95 flex flex-col gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center mb-2 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined fill-icon text-2xl">medical_services</span>
</div>
<div>
<h3 class="font-title-lg text-title-lg text-on-surface mb-1">Find Ambulance</h3>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">Request immediate transport to the nearest suitable medical facility.</p>
</div>
<div class="absolute bottom-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-8xl">medical_services</span>
</div>
</button>
<!-- Find Hospital Card -->
<button class="group relative overflow-hidden bg-surface rounded-xl shadow-sm border border-outline-variant p-6 text-left hover:shadow-md hover:bg-surface-container-lowest transition-all active:scale-95 flex flex-col gap-4">
<div class="w-12 h-12 rounded-full bg-tertiary-container text-on-tertiary-container flex items-center justify-center mb-2 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined fill-icon text-2xl">local_hospital</span>
</div>
<div>
<h3 class="font-title-lg text-title-lg text-on-surface mb-1">Find Hospital</h3>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">Locate nearby emergency rooms and specialized care centers.</p>
</div>
<div class="absolute bottom-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-8xl">local_hospital</span>
</div>
</button>
</section>
<!-- Secondary Section: Recent Activity & Tips -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-stack-md">
<!-- Recent Activity -->
<div class="md:col-span-2 bg-surface rounded-xl shadow-sm border border-outline-variant p-5 flex flex-col gap-4">
<div class="flex justify-between items-center mb-2">
<h3 class="font-title-lg text-title-lg text-on-surface">Recent Activity</h3>
<button class="text-primary font-label-lg text-label-lg hover:underline">View All</button>
</div>
<div class="flex items-center gap-4 p-3 bg-surface-container-low rounded-lg border border-outline-variant/50">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-xl">history</span>
</div>
<div class="flex-grow">
<h4 class="font-label-lg text-label-lg text-on-surface">Ambulance Transport</h4>
<p class="font-label-md text-label-md text-on-surface-variant">Oct 12, 2023 • Mercy General</p>
</div>
<div class="px-2 py-1 bg-surface-variant rounded text-on-surface font-label-md text-label-md">
                        Completed
                    </div>
</div>
</div>
<!-- Health Tips -->
<div class="bg-surface rounded-xl shadow-sm border border-outline-variant p-5 flex flex-col gap-4">
<div class="flex items-center gap-2 mb-2 text-primary">
<span class="material-symbols-outlined">lightbulb</span>
<h3 class="font-title-lg text-title-lg text-on-surface">Daily Tip</h3>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Keep your emergency contacts updated in your profile to ensure rapid communication during critical situations.
                </p>
</div>
</section>
</main>
<!-- Floating SOS Button -->
<button class="fixed bottom-24 md:bottom-8 right-margin-mobile w-16 h-16 bg-error text-on-error rounded-full shadow-lg flex items-center justify-center hover:scale-105 active:scale-95 transition-transform z-40 border-4 border-surface shadow-[0_8px_16px_rgba(186,26,26,0.3)]">
<span class="material-symbols-outlined fill-icon text-3xl">sos</span>
</button>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 pb-safe bg-surface-container-lowest dark:bg-surface-dim border-t border-outline-variant dark:border-outline shadow-lg rounded-t-xl">
<button class="flex flex-col items-center justify-center bg-primary-container dark:bg-on-primary-fixed-variant text-on-primary-container dark:text-primary-fixed rounded-full px-4 py-1 hover:bg-surface-container dark:hover:bg-surface-container-high transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined text-2xl fill-icon">home</span>
<span class="font-label-md text-label-md mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-1 hover:bg-surface-container dark:hover:bg-surface-container-high transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined text-2xl">medical_services</span>
<span class="font-label-md text-label-md mt-1">Ambulances</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-1 hover:bg-surface-container dark:hover:bg-surface-container-high transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined text-2xl">local_hospital</span>
<span class="font-label-md text-label-md mt-1">Hospitals</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-1 hover:bg-surface-container dark:hover:bg-surface-container-high transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined text-2xl">notifications</span>
<span class="font-label-md text-label-md mt-1">Alerts</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-1 hover:bg-surface-container dark:hover:bg-surface-container-high transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined text-2xl">person</span>
<span class="font-label-md text-label-md mt-1">Profile</span>
</button>
</nav>
