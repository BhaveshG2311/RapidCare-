<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Ambulance Tracking</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-container": "#da3433",
                        "on-tertiary-fixed": "#001945",
                        "secondary-fixed": "#ffdad6",
                        "error": "#ba1a1a",
                        "tertiary-container": "#4772ce",
                        "surface-container": "#ebeef1",
                        "outline": "#717783",
                        "surface": "#f7fafd",
                        "primary-container": "#1976d2",
                        "on-surface": "#181c1e",
                        "on-primary-fixed-variant": "#004786",
                        "surface-dim": "#d7dadd",
                        "secondary": "#b6171e",
                        "surface-container-high": "#e5e8eb",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#181c1e",
                        "on-secondary-container": "#fffbff",
                        "on-primary-fixed": "#001c3a",
                        "on-surface-variant": "#414752",
                        "on-tertiary-fixed-variant": "#00429c",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#930010",
                        "secondary-fixed-dim": "#ffb3ac",
                        "primary-fixed-dim": "#a5c8ff",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f7fafd",
                        "surface-tint": "#005faf",
                        "primary": "#005dac",
                        "tertiary-fixed": "#d9e2ff",
                        "inverse-on-surface": "#eef1f4",
                        "background": "#f7fafd",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#fffdff",
                        "tertiary-fixed-dim": "#b0c6ff",
                        "outline-variant": "#c1c6d4",
                        "on-secondary-fixed": "#410003",
                        "surface-container-low": "#f1f4f7",
                        "inverse-surface": "#2d3133",
                        "surface-variant": "#e0e3e6",
                        "on-primary-container": "#fffdff",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#a5c8ff",
                        "surface-container-highest": "#e0e3e6",
                        "tertiary": "#2959b3",
                        "primary-fixed": "#d4e3ff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "unit": "4px",
                        "stack-lg": "24px",
                        "stack-sm": "8px",
                        "touch-target": "48px",
                        "stack-md": "16px",
                        "margin-mobile": "20px",
                        "gutter": "16px",
                        "pb-safe": "env(safe-area-inset-bottom)"
                    },
                    fontFamily: {
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "title-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    fontSize: {
                        "body-lg": ["18px", { lineHeight: "26px", fontWeight: "400" }],
                        "label-md": ["12px", { lineHeight: "16px", fontWeight: "500" }],
                        "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-1px", fontWeight: "700" }],
                        "title-lg": ["22px", { lineHeight: "28px", fontWeight: "500" }],
                        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "label-lg": ["14px", { lineHeight: "20px", letterSpacing: "0.1px", fontWeight: "600" }],
                        "headline-lg-mobile": ["28px", { lineHeight: "36px", fontWeight: "600" }],
                        "headline-lg": ["32px", { lineHeight: "40px", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .animate-pulse-marker {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0, 93, 172, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(0, 93, 172, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0, 93, 172, 0); }
        }
        .progress-bar-animated {
            background: linear-gradient(90deg, #1976d2 25%, #4772ce 50%, #1976d2 75%);
            background-size: 200% 100%;
            animation: gradient-move 2s linear infinite;
        }
        @keyframes gradient-move {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md antialiased overflow-hidden w-full h-screen relative">
<!-- Map Background Image -->
<div class="absolute inset-0 z-0">
<img alt="Map view" class="w-full h-full object-cover" data-alt="A clean, modern top-down map interface showing a city grid. The map style is light-themed with soft gray roads, pale blue water bodies, and subtle green parks. The overall aesthetic is professional and medical-adjacent, suitable for a healthcare app. The lighting is bright and clear, conveying safety and reliability. The color palette focuses on neutral tones with touches of primary blue and surface variant grays to ensure high contrast for UI elements." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBUXrmGWOL5ky9slYR6jx8GL7IY9Hidvp6jvSy8zig8cPm_-vEbPDNet9TS5RDAajFqUesaDnNtH0zn_fVGr3ZItU209kSSJT0SVa2OApeMyy0d6dStHMVxy5AGQB2rSDZK8VpvFifoW9gTYyn-TiY5rwVqAc1OPGesnxPsDk2bzRo1Y25KPUYtXYWUziYfJIP0LqpOAV7kkLOcAl1mVy6kEk25SHCBNFREEY6MuruEoCuKnA8VQsM2AmalYS0cx2AXoQ9SkIV2O9Y"/>
<!-- Fake Route SVG Overlay -->
<svg class="absolute inset-0 w-full h-full" preserveaspectratio="none" viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<path class="opacity-70" d="M 20 80 Q 40 70, 50 50 T 80 20" fill="none" stroke="#005dac" stroke-dasharray="3,3" stroke-width="1.5"></path>
<path d="M 20 80 Q 40 70, 50 50 T 80 20" fill="none" stroke="#1976d2" stroke-width="0.5"></path>
</svg>
<!-- User Location Marker -->
<div class="absolute" style="top: 20%; left: 80%; transform: translate(-50%, -50%);">
<div class="w-4 h-4 bg-error rounded-full border-2 border-surface shadow-sm"></div>
<div class="absolute top-full left-1/2 -translate-x-1/2 mt-1 whitespace-nowrap bg-surface-container-lowest px-2 py-0.5 rounded shadow-sm text-[10px] font-label-md text-on-surface">You</div>
</div>
<!-- Ambulance Location Marker -->
<div class="absolute z-10" style="top: 50%; left: 50%; transform: translate(-50%, -50%);">
<div class="animate-pulse-marker w-8 h-8 bg-primary rounded-full flex items-center justify-center text-on-primary shadow-lg border-2 border-surface">
<span class="material-symbols-outlined text-[16px]" data-icon="medical_services">medical_services</span>
</div>
<div class="absolute top-full left-1/2 -translate-x-1/2 mt-2 whitespace-nowrap bg-surface-container-highest px-2 py-1 rounded shadow-md flex items-center gap-1">
<span class="font-label-md text-on-surface-variant text-[11px] font-semibold tracking-wide">AMB-742</span>
</div>
</div>
</div>
<!-- Top Navigation (Transparent overlay) -->
<header class="absolute top-0 w-full z-20 flex items-center justify-between px-margin-mobile h-14 bg-gradient-to-b from-surface-container-highest/80 to-transparent">
<button class="w-10 h-10 flex items-center justify-center bg-surface-container-lowest rounded-full shadow-sm text-on-surface-variant hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-on-surface drop-shadow-md">Tracking</h1>
<button class="w-10 h-10 flex items-center justify-center bg-surface-container-lowest rounded-full shadow-sm text-error hover:bg-error-container hover:text-on-error-container transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="emergency" data-weight="fill">emergency</span>
</button>
</header>
<!-- Bottom Tracking Card (Level 1 Elevation) -->
<div class="absolute bottom-0 w-full z-30 px-margin-mobile pb-stack-lg pt-4 bg-gradient-to-t from-surface/90 via-surface/70 to-transparent pointer-events-none">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_16px_rgba(0,25,69,0.08)] border border-outline-variant p-stack-md pointer-events-auto flex flex-col gap-stack-md relative overflow-hidden">
<!-- Progress Line Indicator -->
<div class="absolute top-0 left-0 w-full h-1 bg-surface-container-high">
<div class="h-full w-2/3 progress-bar-animated"></div>
</div>
<!-- ETA and Status Header -->
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="font-title-lg text-title-lg text-primary font-bold">5 mins</span>
<span class="font-body-md text-body-md text-on-surface-variant">Estimated Arrival (1.2 km)</span>
</div>
<div class="bg-surface-variant text-primary px-3 py-1 rounded-full font-label-md text-label-md flex items-center gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
                    En Route
                </div>
</div>
<hr class="border-surface-variant border-t"/>
<!-- Driver Info -->
<div class="flex items-center gap-stack-md">
<img alt="Paramedic Driver" class="w-12 h-12 rounded-full border border-surface-variant object-cover" data-alt="A professional headshot of a paramedic wearing a crisp white and blue uniform. The lighting is soft and flattering, emphasizing a calm and competent demeanor. The background is a very subtle, blurred medical or ambulance interior, maintaining a clean, professional aesthetic aligned with a trustworthy healthcare service application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAikvOWcfgqaJf4SMYn9gvjpCVWjzgT3gtN3OZD12SymmDN0MPsIMi33t0-DJB00F1Bym11TsGJJGc_x_PsGtGsLvs9kZyYnrRVA_9TKSgErOCji6Q6v_WAmjsEOdg72p4Z3E5lqtlGjbd0kA7ilMtKq7VIcUnbj4rb-H0YzaozLD-8lnGgwMwD0smBP_AfZErUm--3JD1tY-Bsk5iKlrlSJnFWwKDflScGaWrKoJs_IwBv_0pi6CUU3LZfDXuv0GDdAGby6qW0OSo"/>
<div class="flex-1 flex flex-col">
<span class="font-label-lg text-label-lg text-on-surface">Michael T.</span>
<span class="font-label-md text-label-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="star">star</span>
                        4.9 Paramedic
                    </span>
</div>
<!-- Contact Action -->
<button class="h-touch-target px-4 rounded-full border border-outline text-primary font-label-lg text-label-lg flex items-center gap-2 hover:bg-surface-container active:scale-95 transition-all bg-surface-container-lowest shadow-sm">
<span class="material-symbols-outlined" data-icon="call">call</span>
                    Contact
                </button>
</div>
<!-- Actions row -->
<div class="flex gap-stack-sm pt-stack-sm">
<button class="flex-1 h-touch-target rounded-lg bg-surface-container text-on-surface font-label-lg text-label-lg flex items-center justify-center gap-2 hover:bg-surface-container-high transition-colors active:scale-95 shadow-sm">
<span class="material-symbols-outlined" data-icon="share_location">share_location</span>
                    Share Details
                </button>
</div>
</div>
</div>
</body></html>
