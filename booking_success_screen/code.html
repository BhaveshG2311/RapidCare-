<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Booking Success - RapidCare</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#da3433",
                        "on-tertiary-fixed": "#001945",
                        "secondary-fixed": "#ffdad6",
                        "error": "#ba1a1a",
                        "tertiary-container": "#4772ce",
                        "surface-container": "#ebeef1",
                        "outline": "#717783",
                        "surface": "#f7fafd",
                        "primary-container": "#1976d2",
                        "on-surface": "#181c1e",
                        "on-primary-fixed-variant": "#004786",
                        "surface-dim": "#d7dadd",
                        "secondary": "#b6171e",
                        "surface-container-high": "#e5e8eb",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#181c1e",
                        "on-secondary-container": "#fffbff",
                        "on-primary-fixed": "#001c3a",
                        "on-surface-variant": "#414752",
                        "on-tertiary-fixed-variant": "#00429c",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#930010",
                        "secondary-fixed-dim": "#ffb3ac",
                        "primary-fixed-dim": "#a5c8ff",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f7fafd",
                        "surface-tint": "#005faf",
                        "primary": "#005dac",
                        "tertiary-fixed": "#d9e2ff",
                        "inverse-on-surface": "#eef1f4",
                        "background": "#f7fafd",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#fffdff",
                        "tertiary-fixed-dim": "#b0c6ff",
                        "outline-variant": "#c1c6d4",
                        "on-secondary-fixed": "#410003",
                        "surface-container-low": "#f1f4f7",
                        "inverse-surface": "#2d3133",
                        "surface-variant": "#e0e3e6",
                        "on-primary-container": "#fffdff",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#a5c8ff",
                        "surface-container-highest": "#e0e3e6",
                        "tertiary": "#2959b3",
                        "primary-fixed": "#d4e3ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "stack-lg": "24px",
                        "stack-sm": "8px",
                        "touch-target": "48px",
                        "stack-md": "16px",
                        "margin-mobile": "20px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "title-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "label-md": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-1px", "fontWeight": "700"}],
                        "title-lg": ["22px", {"lineHeight": "28px", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        
        @keyframes sweep {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
        .animate-sweep {
            animation: sweep 2s infinite linear;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col selection:bg-primary selection:text-on-primary">
<!-- Minimal Header (Transactional Context - Nav Shell Suppressed) -->
<header class="flex items-center justify-between px-margin-mobile h-14 w-full">
<div class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">RapidCare</div>
<button class="text-on-surface-variant hover:bg-surface-container-high p-2 rounded-full transition-colors active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pb-safe w-full max-w-2xl mx-auto">
<!-- Success Animation Container -->
<div class="relative w-32 h-32 mb-stack-lg flex items-center justify-center">
<!-- Pulsing background rings indicating active transmission/success -->
<div class="absolute inset-0 bg-primary-container rounded-full animate-ping opacity-60"></div>
<div class="absolute inset-2 bg-primary-container rounded-full opacity-40"></div>
<!-- Solid Icon Carrier -->
<div class="relative z-10 w-20 h-20 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Headline & Subtitle -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-display-lg md:text-display-lg text-center text-primary mb-stack-sm w-full">
            Ambulance Dispatched!
        </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant text-center mb-stack-lg max-w-md">
            Help is on the way. Please stay calm, gather any necessary medications, and keep your phone nearby.
        </p>
<!-- Details Card (Level 1 Elevation - Glass/Tonal Hybrid) -->
<div class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-stack-md flex flex-col gap-stack-md mb-stack-lg relative overflow-hidden">
<!-- Subtle background decoration -->
<div class="absolute -right-8 -top-8 w-32 h-32 bg-surface-container rounded-full opacity-40 pointer-events-none"></div>
<!-- Primary Highlight: ETA -->
<div class="flex flex-col sm:flex-row sm:items-center justify-between bg-surface-container-low p-4 rounded-lg border border-outline-variant/30 gap-3">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">timer</span>
</div>
<div>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block">Estimated Arrival</span>
<span class="font-title-lg text-title-lg text-on-surface font-semibold">Immediate Priority</span>
</div>
</div>
<div class="flex items-baseline gap-1 bg-surface-lowest px-3 py-1 rounded-md border border-outline-variant/20 shadow-sm self-start sm:self-auto">
<span class="font-display-lg text-display-lg text-primary tracking-tight">6</span>
<span class="font-title-lg text-title-lg text-on-surface-variant font-medium">min</span>
</div>
</div>
<!-- Details Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-stack-md mt-2">
<div class="flex flex-col bg-surface-container-low/50 p-3 rounded-lg border border-transparent hover:border-outline-variant/30 transition-colors">
<span class="font-label-md text-label-md text-on-surface-variant mb-1 uppercase tracking-wider flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">airport_shuttle</span> Unit ID
                    </span>
<span class="text-on-surface font-title-lg text-title-lg font-medium">MED-402 (ALS)</span>
</div>
<div class="flex flex-col bg-surface-container-low/50 p-3 rounded-lg border border-transparent hover:border-outline-variant/30 transition-colors">
<span class="font-label-md text-label-md text-on-surface-variant mb-1 uppercase tracking-wider flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">badge</span> Lead Paramedic
                    </span>
<span class="text-on-surface font-title-lg text-title-lg font-medium">S. Jenkins</span>
</div>
</div>
<!-- Active Progress Indicator -->
<div class="flex flex-col gap-2 mt-2">
<div class="flex justify-between items-center px-1">
<span class="font-label-md text-label-md text-primary font-semibold">En Route to your location</span>
<span class="flex h-2 w-2 relative">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
</div>
<div class="w-full h-2 bg-surface-variant rounded-full overflow-hidden relative">
<div class="h-full bg-primary rounded-full w-1/4 relative overflow-hidden">
<div class="absolute inset-0 bg-white/30 animate-sweep"></div>
</div>
</div>
</div>
</div>
<!-- Actions -->
<div class="w-full flex flex-col gap-stack-sm">
<!-- Primary Action (Level 2 Elevation equivalent behavior) -->
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg h-touch-target rounded-full shadow-md hover:bg-on-primary-fixed-variant hover:shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
                Track Ambulance
            </button>
<!-- Secondary/Emergency Context Action -->
<button class="w-full bg-transparent text-error font-label-lg text-label-lg h-touch-target rounded-full border border-error/50 hover:bg-error-container hover:text-on-error-container transition-all active:scale-95 flex items-center justify-center mt-2">
                Cancel Request
            </button>
</div>
</main>
</body></html>
