<style>
        .fade-in {
            animation: fadeIn 1.5s ease-out forwards;
        }
        
        .fade-in-delayed {
            opacity: 0;
            animation: fadeIn 1s ease-out 0.8s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-ring {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface h-screen w-screen overflow-hidden flex flex-col items-center justify-center relative">
<!-- Background Decoration -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-40 -right-40 w-96 h-96 bg-primary opacity-5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-40 -left-40 w-96 h-96 bg-secondary opacity-5 rounded-full blur-3xl"></div>
</div>
<!-- Main Content -->
<div class="z-10 flex flex-col items-center justify-center flex-grow fade-in">
<!-- Logo Icon -->
<div class="relative flex items-center justify-center w-32 h-32 mb-stack-lg">
<div class="absolute inset-0 bg-primary-container opacity-20 rounded-full blur-xl pulse-ring"></div>
<div class="relative bg-surface shadow-lg rounded-full w-24 h-24 flex items-center justify-center border border-surface-variant">
<span class="material-symbols-outlined text-6xl text-secondary" style="font-variation-settings: 'FILL' 1;">
                    emergency_home
                </span>
</div>
</div>
<!-- Brand Name -->
<h1 class="font-display-lg text-display-lg text-on-surface mb-unit">
            Rapid<span class="text-primary">Care</span>
</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant text-center max-w-xs mx-margin-mobile">
            Emergency Medical Response
        </p>
</div>
<!-- Loading Indicator Bottom -->
<div class="z-10 absolute bottom-12 left-0 right-0 flex flex-col items-center justify-center fade-in-delayed">
<div class="flex items-center space-x-2">
<div class="w-2 h-2 rounded-full bg-primary animate-bounce" style="animation-delay: 0ms;"></div>
<div class="w-2 h-2 rounded-full bg-secondary animate-bounce" style="animation-delay: 150ms;"></div>
<div class="w-2 h-2 rounded-full bg-primary animate-bounce" style="animation-delay: 300ms;"></div>
</div>
<p class="font-label-md text-label-md text-on-surface-variant mt-stack-sm tracking-widest uppercase">
            Initializing Systems
        </p>
</div>
