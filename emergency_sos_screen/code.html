<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "surface-dim": "#d7dadd",
                    "secondary": "#b6171e",
                    "surface-container-high": "#e5e8eb",
                    "surface-container-lowest": "#ffffff",
                    "on-background": "#181c1e",
                    "on-secondary-container": "#fffbff",
                    "on-primary-fixed": "#001c3a",
                    "on-surface-variant": "#414752",
                    "on-tertiary-fixed-variant": "#00429c",
                    "on-primary": "#ffffff",
                    "on-secondary-fixed-variant": "#930010",
                    "secondary-fixed-dim": "#ffb3ac",
                    "primary-fixed-dim": "#a5c8ff",
                    "on-error-container": "#93000a",
                    "surface-bright": "#f7fafd",
                    "surface-tint": "#005faf",
                    "primary": "#005dac",
                    "tertiary-fixed": "#d9e2ff",
                    "inverse-on-surface": "#eef1f4",
                    "background": "#f7fafd",
                    "on-error": "#ffffff",
                    "on-tertiary-container": "#fffdff",
                    "tertiary-fixed-dim": "#b0c6ff",
                    "outline-variant": "#c1c6d4",
                    "on-secondary-fixed": "#410003",
                    "surface-container-low": "#f1f4f7",
                    "inverse-surface": "#2d3133",
                    "surface-variant": "#e0e3e6",
                    "on-primary-container": "#fffdff",
                    "error-container": "#ffdad6",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "inverse-primary": "#a5c8ff",
                    "surface-container-highest": "#e0e3e6",

            },
            "borderRadius": {

            "spacing": {

            },
            "fontFamily": {

            },
            "fontSize": {

                    "label-md": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-1px", "fontWeight": "700"}],
                    "title-lg": ["22px", {"lineHeight": "28px", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],

      }

<style>
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .sos-pressed {
            transform: scale(0.95);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden flex flex-col relative select-none touch-manipulation">
<!-- Ambient Background Animation -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20">

</div>
<!-- Top Navigation (Transactional intent -> suppressed standard nav, minimal back) -->
<header class="relative z-10 flex items-center justify-between px-margin-mobile h-14 w-full">
<button class="w-touch-target h-touch-target flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed-dim">RapidCare</span>
<div class="w-touch-target h-touch-target"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 relative z-10 flex flex-col items-center justify-center px-margin-mobile">
<!-- Instructional Text -->
<div class="text-center mb-stack-lg transition-opacity duration-300" id="instruction-text">
<h1 class="font-display-lg text-display-lg text-error mb-stack-sm">EMERGENCY</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Tap to alert nearest emergency services.</p>
</div>
<!-- SOS Button Area -->
<div class="relative flex items-center justify-center mt-8 w-64 h-64">
<!-- Pulsing Rings -->
<div class="absolute inset-0 rounded-full border-4 border-error/30 pulse-ring" style="animation-delay: 0s;"></div>
<div class="absolute inset-0 rounded-full border-4 border-error/20 pulse-ring" style="animation-delay: 0.6s;"></div>
<div class="absolute inset-0 rounded-full border-4 border-error/10 pulse-ring" style="animation-delay: 1.2s;"></div>
<!-- The Core Button -->
<button class="relative z-20 w-48 h-48 rounded-full bg-error text-on-error shadow-[0_8px_32px_rgba(186,26,26,0.4)] flex items-center justify-center transition-all duration-150 ease-out focus:outline-none focus:ring-4 focus:ring-error-container" id="sos-btn">
<span class="font-display-lg text-display-lg tracking-widest font-bold" id="btn-text">SOS</span>
<!-- Hidden Progress Ring -->
<svg class="absolute inset-0 w-full h-full -rotate-90 hidden" id="progress-ring" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="46" stroke="rgba(255,255,255,0.2)" stroke-width="4"></circle>
<circle class="transition-all duration-[1000ms] ease-linear" cx="50" cy="50" fill="none" id="progress-circle" r="46" stroke="#ffffff" stroke-dasharray="289" stroke-dashoffset="289" stroke-width="4"></circle>
</svg>
</button>
</div>
<!-- Location Context (Static for urgency) -->
<div class="mt-stack-lg flex items-center bg-surface-container-low px-4 py-2 rounded-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-primary mr-2" data-icon="my_location" style="font-variation-settings: 'FILL' 1;">my_location</span>
<span class="font-label-lg text-label-lg text-on-surface">Locating...</span>
</div>
</main>
<!-- Bottom Cancel Action (Hidden initially) -->
<div class="relative z-10 w-full px-margin-mobile pb-8 pt-4 translate-y-full transition-transform duration-300 flex justify-center" id="cancel-bar">
<button class="w-full max-w-sm h-touch-target rounded-full bg-surface text-error border-2 border-error font-label-lg text-label-lg shadow-sm flex items-center justify-center active:scale-95 transition-transform" id="cancel-btn">
<span class="material-symbols-outlined mr-2" data-icon="close">close</span>
            Cancel Request
        </button>
</div>
<script>
        const sosBtn = document.getElementById('sos-btn');
        const btnText = document.getElementById('btn-text');
        const progressRing = document.getElementById('progress-ring');
        const progressCircle = document.getElementById('progress-circle');
        const instructionText = document.getElementById('instruction-text');
        const cancelBar = document.getElementById('cancel-bar');
        const cancelBtn = document.getElementById('cancel-btn');
        
        let countdownInterval;
        let isActive = false;
        const totalTime = 5;

        function startCountdown() {
            isActive = true;
            sosBtn.classList.add('sos-pressed');
            progressRing.classList.remove('hidden');
            instructionText.classList.add('opacity-0');
            cancelBar.classList.remove('translate-y-full');
            
            let timeLeft = totalTime;
            btnText.textContent = timeLeft;
            
            // Initial circle set
            const circumference = 2 * Math.PI * 46;
            progressCircle.style.strokeDashoffset = 0;

            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    btnText.textContent = timeLeft;
                    const offset = circumference - (timeLeft / totalTime) * circumference;
                    progressCircle.style.strokeDashoffset = -offset;
                } else {
                    clearInterval(countdownInterval);
                    btnText.textContent = "SENT";
                    btnText.classList.replace('text-display-lg', 'text-title-lg');
                    progressRing.classList.add('hidden');
                    cancelBar.classList.add('translate-y-full');
                    // Add success state logic here
                }
            }, 1000);
        }

        function resetSOS() {
            clearInterval(countdownInterval);
            isActive = false;
            sosBtn.classList.remove('sos-pressed');
            progressRing.classList.add('hidden');
            instructionText.classList.remove('opacity-0');
            cancelBar.classList.add('translate-y-full');
            btnText.textContent = "SOS";
            btnText.classList.replace('text-title-lg', 'text-display-lg');
            progressCircle.style.strokeDashoffset = 289;
        }

        sosBtn.addEventListener('click', () => {
            if (!isActive) startCountdown();
        });

        cancelBtn.addEventListener('click', resetSOS);
    </script>
</body></html>
