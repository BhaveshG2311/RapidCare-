<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        .bg-pattern {
            background-color: #f7fafd;
            background-image: radial-gradient(#d4e3ff 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .input-active:focus-within {
            border-color: #005dac;
            box-shadow: 0 0 0 1px #005dac;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-pattern min-h-screen flex items-center justify-center font-body-md text-on-background relative overflow-hidden">
<!-- Ambient Background Icons -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-[0.03] flex items-center justify-center">
<span class="material-symbols-outlined text-[400px] text-primary">medical_services</span>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md mx-margin-mobile md:mx-auto">
<div class="glass-panel rounded-xl shadow-lg border border-surface-variant p-stack-lg flex flex-col gap-stack-lg">
<!-- Brand Header -->
<div class="text-center flex flex-col items-center gap-stack-sm mb-stack-sm">
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container mb-2">
<span class="material-symbols-outlined text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">emergency_home</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">RapidCare</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your account</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<!-- Email/Phone Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="identifier">Email or Phone Number</label>
<div class="relative input-active rounded border border-outline-variant bg-surface overflow-hidden transition-colors">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full h-touch-target pl-10 pr-4 bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="identifier" placeholder="Enter your email or phone" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative input-active rounded border border-outline-variant bg-surface overflow-hidden transition-colors">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full h-touch-target pl-10 pr-10 bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="password" placeholder="Enter your password" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-touch-target mt-stack-sm bg-primary text-on-primary rounded font-label-lg text-label-lg shadow-sm hover:bg-surface-tint active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Login
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-stack-sm">
<div class="flex-1 h-[1px] bg-surface-variant"></div>
<span class="font-label-md text-label-md text-on-surface-variant">OR</span>
<div class="flex-1 h-[1px] bg-surface-variant"></div>
</div>
<!-- Social Login -->
<div class="flex flex-col gap-stack-sm">
<button class="w-full h-touch-target border-1.5 border-outline-variant rounded bg-surface text-on-surface font-label-lg text-label-lg flex items-center justify-center gap-3 hover:bg-surface-container-low transition-colors shadow-sm" type="button">
<img alt="Google logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqiP-FID8pZBopHOOmxhWaNgfc0oQBRWLrsBFwCiu-O8Q5PXeqQi5-mPu8UdxmI0rosAzGyTFVPc06wbr_yflnCPtyyAUQ7mAbSfGAPhHtHTe8wl7U9aZZD_RMFDxTQNtNAAlr3x3cblgCKaDztDnoDu7NNp4ZFCfaa4G2wBexL4YkDV8E2eVexa3EyHGSkOu574BgUIWSeltR6lYhycPLCJ6NOulrlMoVPuMGNxqMGPFeejVYFHTLBibtJJ9B9PxMdl_eh58dDws"/>
                    Continue with Google
                </button>
<button class="w-full h-touch-target border-1.5 border-outline-variant rounded bg-surface text-on-surface font-label-lg text-label-lg flex items-center justify-center gap-3 hover:bg-surface-container-low transition-colors shadow-sm" type="button">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">apps</span>
                    Continue with Apple
                </button>
</div>
<!-- Sign Up Prompt -->
<div class="text-center mt-stack-sm">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-label-lg text-label-lg text-primary hover:text-primary-fixed-dim transition-colors" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Footer -->
<div class="mt-stack-lg text-center">
<p class="font-label-md text-label-md text-outline">Secure connection encrypted for healthcare data.</p>
</div>
</main>
</body></html>
